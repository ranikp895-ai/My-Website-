<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Love You Darling 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #ff6b6b, #feca57, #ff9ff3, #54a0ff);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 500px;
            width: 90%;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .heart {
            font-size: 80px;
            animation: heartbeat 1.5s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .love-text {
            font-family: 'Dancing Script', cursive;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.5); }
            to { text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 30px rgba(255,255,255,0.8); }
        }

        .sub-text {
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .name-input {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            padding: 15px 25px;
            font-size: 18px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            width: 80%;
            max-width: 300px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .name-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .name-input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(255,107,107,0.4);
            transform: scale(1.02);
        }

        .personal-message {
            font-family: 'Dancing Script', cursive;
            font-size: 32px;
            color: #fff;
            margin: 20px 0;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart-particle {
            position: absolute;
            font-size: 20px;
            color: #ff6b6b;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(100vh) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .love-text { font-size: 36px; }
            .sub-text { font-size: 20px; }
            .heart { font-size: 60px; }
            .container { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <div class="heart">💖</div>
        <div class="love-text" id="loveText">I Love You Darling 💕</div>
        <div class="sub-text">Enter your name to see a special message:</div>
        
        <input type="text" class="name-input" id="nameInput" placeholder="Your name..." maxlength="20">
        
        <div class="personal-message" id="personalMsg"></div>
    </div>

    <script>
        // Floating hearts animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = ['💖', '💕', '💗', '💓', '💞'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.getElementById('hearts').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createHeart, 300);

        // Personal message functionality
        const nameInput = document.getElementById('nameInput');
        const personalMsg = document.getElementById('personalMsg');
        const loveText = document.getElementById('loveText');

        nameInput.addEventListener('input', function() {
            const name = this.value.trim();
            if (name) {
                const messages = [
                    `I love you so much, ${name}! 💕`,
                    `You make me so happy, ${name}! 😍`,
                    `${name}, you're my everything! 💖`,
                    `Forever yours, ${name}! 🌹`,
                    `My heart beats for you, ${name}! 💓`
                ];
                personalMsg.textContent = messages[Math.floor(Math.random() * messages.length)];
                loveText.style.opacity = '0.7';
            } else {
                personalMsg.textContent = '';
                loveText.style.opacity = '1';
            }
        });

        // Auto-focus on input
        nameInput.focus();

        // Add click to focus effect
        document.addEventListener('click', function(e) {
            if (!nameInput.contains(e.target)) {
                nameInput.focus();
            }
        });

        // Confetti effect on first load
        setTimeout(() => {
            createHeart();
            createHeart();
            createHeart();
        }, 500);
    </script>
</body>
</html>
